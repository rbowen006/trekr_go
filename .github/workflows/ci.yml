name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: rv_marketplace_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:password@localhost:5433/rv_marketplace_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run unit tests
        run: make test

      # trekr_go never runs DDL; load the Rails schema snapshot so integration
      # tests have real tables to hit against the fresh CI Postgres.
      - name: Load Rails schema
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f test/schema.sql

      - name: Run integration tests
        run: make test-integration
